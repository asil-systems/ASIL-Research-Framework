<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>ASIL Live Intelligence System</title>

<style>

body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at top, #04060a, #02030a);
    font-family: Arial;
}

/* CANVAS */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* PANEL */
.panel {
    position: absolute;
    top: 18px;
    left: 18px;
    width: 260px;
    padding: 14px;
    border-radius: 12px;

    background: rgba(10,14,20,0.65);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.06);
}

.title {
    font-size: 13px;
    color: #58a6ff;
    margin-bottom: 10px;
}

.node {
    padding: 8px;
    margin: 6px 0;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    transition: 0.2s;
}

.node:hover {
    background: rgba(88,166,255,0.2);
}

.small {
    font-size: 11px;
    opacity: 0.6;
    margin-top: 10px;
}

/* BLACKBOX LABEL */
.blackbox {
    position: absolute;
    right: 18px;
    top: 18px;
    font-size: 10px;
    opacity: 0.4;
    color: #58a6ff;
}

</style>

</head>

<body>

<canvas id="c"></canvas>

<div class="panel">
<div class="title">LIVE INTELLIGENCE GRAPH</div>

<div class="node">Telemetry Node A</div>
<div class="node">Inference Node B</div>
<div class="node">System Node C</div>
<div class="node">Research Node D</div>

<div class="small">graph state: dynamic / adaptive</div>
</div>

<div class="blackbox">BLACKBOX MODE • INTERNAL LOGIC HIDDEN</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

window.onresize = () => {
canvas.width = innerWidth;
canvas.height = innerHeight;
};

let mouse = { x: innerWidth/2, y: innerHeight/2 };

window.addEventListener("mousemove", e=>{
mouse.x = e.clientX;
mouse.y = e.clientY;
});

/* NODES */
const nodes = [];

for(let i=0;i<6;i++){
nodes.push({
x: Math.random()*innerWidth,
y: Math.random()*innerHeight,
vx: (Math.random()-0.5)*1.5,
vy: (Math.random()-0.5)*1.5
});
}

/* UPDATE */
function update(){

nodes.forEach(n=>{

/* motion */
n.x += n.vx;
n.y += n.vy;

/* mouse influence */
let dx = mouse.x - n.x;
let dy = mouse.y - n.y;

n.x += dx * 0.0008;
n.y += dy * 0.0008;

/* bounds */
if(n.x < 0 || n.x > innerWidth) n.vx *= -1;
if(n.y < 0 || n.y > innerHeight) n.vy *= -1;

});
}

/* DRAW */
function draw(){

ctx.clearRect(0,0,innerWidth,innerHeight);

/* links */
for(let i=0;i<nodes.length;i++){
for(let j=i+1;j<nodes.length;j++){

let a = nodes[i];
let b = nodes[j];

let dist = Math.hypot(a.x-b.x, a.y-b.y);

if(dist < 220){

ctx.strokeStyle = "rgba(88,166,255,0.15)";
ctx.beginPath();
ctx.moveTo(a.x,a.y);
ctx.lineTo(b.x,b.y);
ctx.stroke();

}

}
}

/* nodes */
nodes.forEach(n=>{

ctx.beginPath();
ctx.fillStyle = "#58a6ff";
ctx.arc(n.x,n.y,5,0,Math.PI*2);
ctx.fill();

});

}

/* LOOP */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
