<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>ASIL Reactive System</title>

<style>

body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at top, #03060a, #010208);
    font-family: Arial;
    color: #d8e6f5;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* PANEL */
.panel {
    position: absolute;
    top: 14px;
    left: 14px;
    width: 270px;
    padding: 14px;
    background: rgba(10,14,20,0.7);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
}

.title {
    font-size: 13px;
    color: #58a6ff;
    margin-bottom: 8px;
}

.small {
    font-size: 11px;
    opacity: 0.6;
}

/* ISS BUTTON */
.iss {
    position: absolute;
    width: 150px;
    height: 60px;
    border-radius: 30px;
    background: linear-gradient(135deg, #ffffff, #b9c8ff);
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 40px rgba(255,255,255,0.5);
    z-index: 10;
    user-select: none;
    transition: 0.2s;
}

.iss:active {
    transform: scale(0.95);
}

/* EVENT LABEL */
.event {
    position: absolute;
    top: 80px;
    left: 20px;
    font-size: 11px;
    color: #58a6ff;
    opacity: 0;
    transition: 0.3s;
}

</style>

</head>

<body>

<canvas id="c"></canvas>

<div class="panel">
<div class="title">ASIL REACTIVE GRAPH</div>
<div class="small">click ISS or nodes to influence system</div>
</div>

<div class="iss" id="iss">ISS CORE NODE</div>

<div class="event" id="event">SYSTEM EVENT</div>

<script>

const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

window.onresize = () => {
c.width = innerWidth;
c.height = innerHeight;
};

let eventBox = document.getElementById("event");

/* ISS */
const iss = document.getElementById("iss");
let t = 0;

let issX = innerWidth/2;
let issY = innerHeight/2;

/* SYSTEM STATE */
let pulse = 0;

/* NODES */
const nodes = [];

for(let i=0;i<14;i++){
nodes.push({
x: Math.random()*innerWidth,
y: Math.random()*innerHeight,
vx: (Math.random()-0.5)*1.2,
vy: (Math.random()-0.5)*1.2
});
}

/* SHOW EVENT */
function trigger(text){
eventBox.innerText = text;
eventBox.style.opacity = 1;

setTimeout(()=>{
eventBox.style.opacity = 0;
},800);
}

/* ISS MOTION */
function moveISS(){

t += 0.01;

issX = innerWidth/2 + Math.cos(t)*220;
issY = innerHeight/2 + Math.sin(t*1.3)*140;

iss.style.left = issX + "px";
iss.style.top = issY + "px";
}

/* CLICK ISS = SYSTEM REACTION */
iss.onclick = ()=>{

pulse = 1;

nodes.forEach(n=>{
n.vx += (Math.random()-0.5)*4;
n.vy += (Math.random()-0.5)*4;
});

trigger("ISS CORE ACTIVATED → SYSTEM RESTRUCTURING");
};

/* UPDATE */
function update(){

pulse *= 0.95;

nodes.forEach(n=>{

n.x += n.vx;
n.y += n.vy;

/* damping */
n.vx *= 0.98;
n.vy *= 0.98;

/* bounds */
if(n.x<0||n.x>innerWidth) n.vx*=-1;
if(n.y<0||n.y>innerHeight) n.vy*=-1;

/* ISS influence */
let dx = issX - n.x;
let dy = issY - n.y;

n.x += dx*0.0006;
n.y += dy*0.0006;

/* pulse effect */
n.x += dx * pulse * 0.002;
n.y += dy * pulse * 0.002;

});

}

/* DRAW */
function draw(){

ctx.clearRect(0,0,innerWidth,innerHeight);

/* links */
for(let i=0;i<nodes.length;i++){
for(let j=i+1;j<nodes.length;j++){

let a = nodes[i];
let b = nodes[j];

let d = Math.hypot(a.x-b.x,a.y-b.y);

if(d < 170){

ctx.strokeStyle = `rgba(88,166,255,${0.2 - d/900})`;
ctx.beginPath();
ctx.moveTo(a.x,a.y);
ctx.lineTo(b.x,b.y);
ctx.stroke();

}

}
}

/* nodes */
nodes.forEach(n=>{

ctx.beginPath();
ctx.fillStyle = "#58a6ff";
ctx.arc(n.x,n.y,4 + pulse*2,0,Math.PI*2);
ctx.fill();

});

/* ISS */
ctx.beginPath();
ctx.fillStyle = "#ffffff";
ctx.arc(issX,issY,7,0,Math.PI*2);
ctx.fill();

}

/* LOOP */
function loop(){
update();
draw();
moveISS();
requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
