<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>ASIL Core Graph System</title>

<style>

body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: radial-gradient(circle at top, #03060a, #010208);
}

/* CANVAS */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* PANEL */
.panel {
    position: absolute;
    top: 14px;
    left: 14px;
    width: 270px;
    padding: 14px;
    background: rgba(10,14,20,0.7);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
}

.title {
    font-size: 13px;
    color: #58a6ff;
    margin-bottom: 8px;
}

.small {
    font-size: 11px;
    opacity: 0.6;
}

/* ISS BUTTON — NOW BIG & NOTICEABLE */
.iss {
    position: absolute;
    width: 140px;
    height: 56px;
    border-radius: 28px;
    background: linear-gradient(135deg, #ffffff, #b8c7ff);
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;

    box-shadow: 0 0 30px rgba(255,255,255,0.6),
                0 0 80px rgba(88,166,255,0.3);

    z-index: 10;
    user-select: none;
}

/* WARNING LABEL */
.warn {
    position: absolute;
    font-size: 10px;
    color: #ff4d4d;
    top: -18px;
    left: 20px;
    letter-spacing: 2px;
    opacity: 0.9;
}

/* GRAPH MODE */
.graph-mode {
    position: absolute;
    inset: 0;
    display: none;
    background: #02040a;
    padding: 40px;
    overflow-y: auto;
}

.close {
    position: absolute;
    top: 14px;
    right: 14px;
    padding: 8px 10px;
    font-size: 11px;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    cursor: pointer;
}

</style>

</head>

<body>

<canvas id="c"></canvas>

<div class="panel">
<div class="title">ASIL CORE SYSTEM</div>
<div class="small">graph + central anchor node</div>
</div>

<!-- ISS CORE NODE -->
<div class="iss" id="iss">
<div class="warn">DO NOT PRESS</div>
ISS CORE NODE
</div>

<!-- GRAPH MODE -->
<div class="graph-mode" id="graph">

<div class="close" onclick="closeGraph()">EXIT</div>

<h1>GRAPH MODE</h1>

<p>System collapsed into textual representation layer.</p>

<p>Core node defines initial coherence anchor for all distributed states.</p>

</div>

<script>

const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

/* ISS */
const iss = document.getElementById("iss");

let t = 0;
let issX = innerWidth/2;
let issY = innerHeight/2;

/* CORE NODE (MAIN ANCHOR) */
const core = {
x: innerWidth/2,
y: innerHeight/2
};

/* NODES */
const nodes = [];

for(let i=0;i<12;i++){
nodes.push({
x: Math.random()*innerWidth,
y: Math.random()*innerHeight,
vx: (Math.random()-0.5)*1.2,
vy: (Math.random()-0.5)*1.2
});
}

/* MOVE ISS */
function moveISS(){

t += 0.01;

issX = innerWidth/2 + Math.cos(t)*220;
issY = innerHeight/2 + Math.sin(t*1.4)*140;

iss.style.left = issX + "px";
iss.style.top = issY + "px";
}

/* UPDATE SYSTEM */
function update(){

nodes.forEach(n=>{

n.x += n.vx;
n.y += n.vy;

/* bounds */
if(n.x<0||n.x>innerWidth) n.vx*=-1;
if(n.y<0||n.y>innerHeight) n.vy*=-1;

/* ISS attraction */
let dx1 = issX - n.x;
let dy1 = issY - n.y;

n.x += dx1*0.0005;
n.y += dy1*0.0005;

/* CORE ATTRACTION (NEW MAIN LINK) */
let dx2 = core.x - n.x;
let dy2 = core.y - n.y;

n.x += dx2*0.0008;
n.y += dy2*0.0008;

});

}

/* DRAW */
function draw(){

ctx.clearRect(0,0,innerWidth,innerHeight);

/* CORE LINKS (NEW PRIMARY CONNECTION) */
nodes.forEach(n=>{

ctx.strokeStyle = "rgba(255,255,255,0.08)";
ctx.beginPath();
ctx.moveTo(n.x,n.y);
ctx.lineTo(core.x,core.y);
ctx.stroke();

});

/* NODE LINKS */
for(let i=0;i<nodes.length;i++){
for(let j=i+1;j<nodes.length;j++){

let a = nodes[i];
let b = nodes[j];

let d = Math.hypot(a.x-b.x,a.y-b.y);

if(d < 180){

ctx.strokeStyle = "rgba(88,166,255,0.15)";
ctx.beginPath();
ctx.moveTo(a.x,a.y);
ctx.lineTo(b.x,b.y);
ctx.stroke();

}

}
}

/* CORE NODE */
ctx.beginPath();
ctx.fillStyle = "#ffffff";
ctx.arc(core.x,core.y,8,0,Math.PI*2);
ctx.fill();

/* ISS NODE */
ctx.beginPath();
ctx.fillStyle = "#7c4dff";
ctx.arc(issX,issY,6,0,Math.PI*2);
ctx.fill();

/* NODES */
nodes.forEach(n=>{
ctx.beginPath();
ctx.fillStyle = "#58a6ff";
ctx.arc(n.x,n.y,4,0,Math.PI*2);
ctx.fill();
});

}

/* LOOP */
function loop(){
update();
draw();
moveISS();
requestAnimationFrame(loop);
}

loop();

/* CLICK ISS */
iss.onclick = ()=>{
document.getElementById("graph").style.display = "block";
};

/* CLOSE */
function closeGraph(){
document.getElementById("graph").style.display = "none";
}

</script>

</body>
</html>
