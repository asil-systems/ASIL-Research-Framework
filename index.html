<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>ASIL Unified System</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #05070c;
    color: #d7e6f2;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* TOP BAR */
.topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;
    background: rgba(10,14,20,0.9);
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.logo {
    color: #58a6ff;
    font-weight: bold;
    font-size: 13px;
}

.tabs {
    margin-left: 30px;
    display: flex;
    gap: 20px;
}

.tab {
    font-size: 12px;
    opacity: 0.6;
    cursor: pointer;
}

.tab:hover {
    opacity: 1;
}

/* LAYOUT */
.container {
    margin-top: 50px;
    display: flex;
    height: calc(100vh - 50px);
}

/* LEFT */
.left {
    width: 320px;
    background: rgba(10,14,20,0.6);
    border-right: 1px solid rgba(255,255,255,0.06);
    padding: 10px;
}

/* CENTER */
.center {
    flex: 1;
    padding: 20px;
}

/* NODE */
.node {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #58a6ff;
    position: absolute;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(88,166,255,0.5);
}

.node:hover {
    background: white;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.03);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.05);
}

.card:hover {
    background: rgba(88,166,255,0.08);
}

.title {
    font-size: 12px;
    color: #58a6ff;
}

.text {
    font-size: 11px;
    opacity: 0.7;
}

/* PANEL */
.panel {
    position: absolute;
    right: 10px;
    top: 60px;
    width: 320px;
    padding: 12px;
    background: rgba(10,14,20,0.85);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
}

.item {
    font-size: 11px;
    margin-bottom: 6px;
    padding-left: 10px;
    border-left: 2px solid rgba(88,166,255,0.4);
}

</style>

</head>

<body>

<div class="topbar">
<div class="logo">ASIL UNIFIED SYSTEM</div>

<div class="tabs">
<div class="tab" onclick="mode='product'">Product</div>
<div class="tab" onclick="mode='engine'">AI Engine</div>
<div class="tab" onclick="mode='chain'">Chain View</div>
</div>
</div>

<div class="container">

<div class="left">

<div class="card" onclick="open('teleport')">
<div class="title">Teleportation Model</div>
<div class="text">State transfer systems</div>
</div>

<div class="card" onclick="open('coherence')">
<div class="title">Coherence Field</div>
<div class="text">Stability networks</div>
</div>

<div class="card" onclick="open('asil')">
<div class="title">ASIL Core</div>
<div class="text">Full system architecture</div>
</div>

</div>

<div class="center" id="center">
<h2>ASIL SYSTEM READY</h2>
<p>Select mode and node.</p>
</div>

</div>

<div class="panel" id="panel">
<div class="item">Click node to view data</div>
</div>

<script>

let mode = "product";

/* MEMORY GRAPH */
let graph = {
teleport: 3,
coherence: 2,
asil: 5
};

/* CHAIN DATA */
const chains = {

teleport: [
"Project: Teleportation Engine",
"Article I: State Transfer Model",
"Article II: Quantum Mapping",
"Result: Distributed identity sync"
],

coherence: [
"Project: Stability Layer",
"Article I: Coherence Theory",
"Article II: Synchronization Model",
"Result: Multi-agent stability"
],

asil: [
"ASIL Core System",
"Vision Layer",
"Intelligence Layer",
"Interaction Layer",
"Stability Layer",
"Result: Full adaptive system"
]

};

function open(id){

/* PRODUCT MODE */
if(mode === "product"){
document.getElementById("center").innerHTML =
`<h2>${id}</h2><p>Weight: ${graph[id]||1}</p>`;
}

/* ENGINE MODE */
if(mode === "engine"){

graph[id] = (graph[id]||1)+1;

Object.keys(graph).forEach(k=>{
if(k!==id && Math.random()>0.5){
graph[k]+=1;
}
});

renderEngine();

}

/* CHAIN MODE */
if(mode === "chain"){
renderChain(id);
}

}

function renderEngine(){

let html = "<h2>AI ENGINE STATE</h2>";

for(let k in graph){
html += `<p>🔵 ${k} → ${graph[k]}</p>`;
}

document.getElementById("center").innerHTML = html;

}

function renderChain(id){

let html = "<h3>CHAIN EXPANSION</h3>";

chains[id].forEach((c,i)=>{
html += `<div class="item">${i+1}. ${c}</div>`;
});

document.getElementById("panel").innerHTML = html;

}

</script>

</body>
</html>
