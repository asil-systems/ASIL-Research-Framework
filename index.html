<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>ASIL Hybrid System</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #05070c;
    color: #d7e6f2;
}

/* TOP BAR */
.topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;
    background: rgba(10,14,20,0.9);
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.logo {
    color: #58a6ff;
    font-weight: bold;
    font-size: 14px;
}

.tabs {
    margin-left: 40px;
    display: flex;
    gap: 20px;
}

.tab {
    font-size: 12px;
    opacity: 0.6;
    cursor: pointer;
}

.tab:hover {
    opacity: 1;
}

/* LAYOUT */
.container {
    display: flex;
    margin-top: 50px;
    height: calc(100vh - 50px);
}

/* LEFT PANEL */
.left {
    width: 320px;
    background: rgba(10,14,20,0.6);
    border-right: 1px solid rgba(255,255,255,0.06);
    padding: 15px;
}

/* CENTER */
.center {
    flex: 1;
    padding: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    cursor: pointer;
}

.card:hover {
    background: rgba(88,166,255,0.08);
}

.title {
    font-size: 13px;
    color: #58a6ff;
}

.text {
    font-size: 11px;
    opacity: 0.7;
    margin-top: 5px;
}

/* ENGINE VIEW */
.engine {
    display: none;
}

.node {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #58a6ff;
    display: inline-block;
    margin-right: 6px;
}

</style>

</head>

<body>

<div class="topbar">
<div class="logo">ASIL HYBRID SYSTEM</div>

<div class="tabs">
<div class="tab" onclick="mode='product'">Product Mode</div>
<div class="tab" onclick="mode='engine'">AI Engine</div>
</div>
</div>

<div class="container">

<!-- LEFT -->
<div class="left">
<div class="card" onclick="openNode('Teleportation')">
<div class="title">Teleportation Model</div>
<div class="text">State transfer abstraction between systems</div>
</div>

<div class="card" onclick="openNode('Coherence')">
<div class="title">Coherence Field</div>
<div class="text">Stability of distributed structures</div>
</div>

<div class="card" onclick="openNode('Emergence')">
<div class="title">Emergence Layer</div>
<div class="text">Global patterns from local rules</div>
</div>
</div>

<!-- CENTER -->
<div class="center" id="center">

<h2>ASIL SYSTEM</h2>
<p>Choose a node or switch mode.</p>

</div>

</div>

<script>

let mode = "product";

/* SIMPLE AI ENGINE MEMORY */
let graph = {
"Teleportation": 5,
"Coherence": 3,
"Emergence": 2
};

function openNode(name){

if(mode === "product"){
document.getElementById("center").innerHTML = `
<h2>${name}</h2>
<p>Research module active.</p>
<p>Connections strength: ${graph[name] || 1}</p>
`;
}

/* ENGINE MODE */
if(mode === "engine"){

graph[name] = (graph[name] || 1) + 1;

/* simulate growth */
Object.keys(graph).forEach(k=>{
if(k !== name && Math.random() > 0.5){
graph[k] += 1;
}
});

renderEngine();

}

}

/* ENGINE VIEW */
function renderEngine(){

let html = "<h2>AI ENGINE STATE</h2>";

Object.keys(graph).forEach(k=>{
html += `
<p><span class="node"></span>${k} → weight: ${graph[k]}</p>
`;
});

document.getElementById("center").innerHTML = html;

}

</script>

</body>
</html>
