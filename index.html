<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASIL Systems Institute</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #050914;
    color: #d7e6f2;
}

/* TOPBAR */
.topbar {
    height: 62px;
    display: flex;
    align-items: center;
    padding: 0 25px;
    background: rgba(10,14,20,0.95);
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* LOGO */
.logo-main {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #58a6ff, #9ecbff, #58a6ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.logo-sub {
    font-size: 9px;
    opacity: 0.5;
    letter-spacing: 2px;
}

/* NAV */
.nav {
    margin-left: 40px;
    display: flex;
    gap: 18px;
}

.nav div {
    cursor: pointer;
    opacity: 0.7;
    font-size: 12px;
}

.nav div:hover {
    opacity: 1;
}

/* RIGHT PANEL */
.right {
    margin-left: auto;
    display: flex;
    gap: 12px;
}

.right div {
    cursor: pointer;
    font-size: 12px;
    opacity: 0.5;
}

.active {
    opacity: 1 !important;
    color: #58a6ff;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 62px);
}

.sidebar {
    width: 270px;
    border-right: 1px solid rgba(255,255,255,0.08);
    padding: 15px;
}

.card {
    padding: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 10px;
    cursor: pointer;
}

.card:hover {
    background: rgba(88,166,255,0.08);
}

.main {
    flex: 1;
    padding: 25px;
}

/* PAPER */
.paper {
    padding: 18px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    background: rgba(255,255,255,0.02);
}

.section {
    margin-top: 10px;
    font-size: 13px;
    opacity: 0.9;
}

pre {
    white-space: pre-wrap;
    font-size: 13px;
}

/* TITLE */
h1 {
    color: #58a6ff;
}

</style>
</head>

<body>

<div class="topbar">

<div>
<div class="logo-main">ASIL</div>
<div class="logo-sub">SYSTEMS INSTITUTE</div>
</div>

<div class="nav">
<div onclick="home()">Home</div>
<div onclick="papersView()">Publications</div>
<div onclick="contact()">Contact</div>
</div>

<div class="right">
<div id="en" onclick="setLang('en')">EN</div>
<div id="ru" onclick="setLang('ru')">RU</div>
<div id="cn" onclick="setLang('cn')">CN</div>

<div id="rbtn" onclick="setLevel('l2')">R</div>
<div id="pbtn" onclick="setLevel('l3')">P</div>
</div>

</div>

<div class="container">

<div class="sidebar">

<div class="card" onclick="openPaper(1)">ASIL Core Architecture</div>
<div class="card" onclick="openPaper(2)">Teleportation Model</div>
<div class="card" onclick="openPaper(3)">Coherence Field</div>
<div class="card" onclick="openPaper(4)">Emergence Theory</div>
<div class="card" onclick="openPaper(5)">System Synthesis</div>

</div>

<div class="main" id="main"></div>

</div>

<script>

let lang = "en";
let level = "l2";
let current = { type: "home" };

/* PAPERS (FINAL STRUCTURE) */
const papers = {

1: {
title: "ASIL Core Architecture",
l2: "Adaptive graph system where nodes evolve through weighted interaction dynamics.",
l3: `
Abstract — Adaptive graph-based knowledge system.

Method — Graph G = (N, E), node evolution via N(t+1)=f(N(t),E(t))

Result — Stable semantic clustering emerges under interaction load.
`
},

2: {
title: "Teleportation Model",
l2: "State transfer preserving identity under structural constraints.",
l3: `
Abstract — Structural state preservation model.

Method — S = {structure, context, weight}

Transformation T(S1→S2) with minimal loss.

Result — Identity preserved across transformation space.
`
},

3: {
title: "Coherence Field",
l2: "System stability defined by persistent interaction ratio.",
l3: `
Abstract — Stability metric for distributed systems.

Method — C = Σ stable_edges / Σ total_edges

Result — High C leads to structural convergence.
`
},

4: {
title: "Emergence Theory",
l2: "Global structures arise from local interaction rules.",
l3: `
Abstract — Emergent structural formation.

Method — iterative rule system Rⁿ

Result — Macro-structures emerge from micro-interactions.
`
},

5: {
title: "System Synthesis",
l2: "Unified model of nodes, relations, and stability.",
l3: `
Abstract — Unified adaptive system model.

Method — ASIL = (N, E, D, S)

Result — Self-organizing knowledge architecture.
`
}

};

/* LANGUAGE */
function setLang(l){
lang = l;
updateUI();
render();
}

/* LEVEL */
function setLevel(l){
level = l;
updateUI();
render();
}

/* UI UPDATE */
function updateUI(){

["en","ru","cn"].forEach(id=>{
document.getElementById(id).classList.remove("active");
});

document.getElementById(lang).classList.add("active");

document.getElementById("rbtn").classList.remove("active");
document.getElementById("pbtn").classList.remove("active");

if(level==="l2") document.getElementById("rbtn").classList.add("active");
if(level==="l3") document.getElementById("pbtn").classList.add("active");

}

/* NAV */
function home(){
current = { type:"home" };
document.getElementById("main").innerHTML =
(lang==="ru") ? "<h1>ASIL Институт</h1>" :
(lang==="cn") ? "<h1>ASIL 研究所</h1>" :
"<h1>ASIL Systems Institute</h1>";
}

function contact(){
current = { type:"contact" };
document.getElementById("main").innerHTML =
"<h1>Contact</h1><p>research@asil.systems</p>";
}

function papersView(){
current = { type:"papers" };
document.getElementById("main").innerHTML =
"<h1>Publications</h1><p>Select a paper</p>";
}

function openPaper(id){

current = { type:"paper", id:id };

let p = papers[id];
let text = (level==="l2") ? p.l2 : p.l3;

document.getElementById("main").innerHTML = `
<div class="paper">
<h1>${p.title}</h1>
<pre>${text}</pre>
</div>
`;

}

/* RENDER */
function render(){
if(current.type==="home") home();
if(current.type==="papers") papersView();
if(current.type==="paper") openPaper(current.id);
if(current.type==="contact") contact();
}

/* INIT */
updateUI();
home();

</script>

</body>
</html>
