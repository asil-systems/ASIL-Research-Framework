<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASIL Systems Institute</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #070b12;
    color: #d7e6f2;
}

/* TOPBAR */
.topbar {
    height: 60px;
    background: rgba(10,14,20,0.95);
    display: flex;
    align-items: center;
    padding: 0 25px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* LOGO */
.logo-main {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #58a6ff, #9ecbff, #58a6ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.logo-sub {
    font-size: 9px;
    opacity: 0.6;
}

/* NAV */
.nav {
    margin-left: 40px;
    display: flex;
    gap: 20px;
}

.nav div {
    cursor: pointer;
    opacity: 0.7;
}

.nav div:hover { opacity: 1; }

/* LANG */
.lang {
    margin-left: auto;
    display: flex;
    gap: 12px;
}

.lang div {
    cursor: pointer;
    opacity: 0.5;
}

.lang .active {
    opacity: 1;
    color: #58a6ff;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 60px);
}

.sidebar {
    width: 260px;
    padding: 15px;
    border-right: 1px solid rgba(255,255,255,0.08);
}

.card {
    padding: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 10px;
    cursor: pointer;
}

.card:hover {
    background: rgba(88,166,255,0.1);
}

.main {
    flex: 1;
    padding: 20px;
}

.paper {
    padding: 15px;
    border: 1px solid rgba(255,255,255,0.06);
}

</style>
</head>

<body>

<div class="topbar">
<div>
<div class="logo-main">ASIL</div>
<div class="logo-sub">SYSTEMS INSTITUTE</div>
</div>

<div class="nav">
<div onclick="home()">Home</div>
<div onclick="showPapers()">Publications</div>
<div onclick="contact()">Contact</div>
</div>

<div class="lang">
<div id="en" onclick="setLang('en')">EN</div>
<div id="ru" onclick="setLang('ru')">RU</div>
<div id="cn" onclick="setLang('cn')">中文</div>
</div>
</div>

<div class="container">

<div class="sidebar">
<div class="card" onclick="showPaper(1)">ASIL Core</div>
<div class="card" onclick="showPaper(2)">Teleportation</div>
<div class="card" onclick="showPaper(3)">Coherence</div>
<div class="card" onclick="showPaper(4)">Emergence</div>
<div class="card" onclick="showPaper(5)">Synthesis</div>
</div>

<div class="main" id="main"></div>

</div>

<script>

let lang = "en";
let currentView = { type: "home" };

const papers = {

1: {
title: "ASIL Core Architecture",
en: "Adaptive knowledge graph system.",
ru: "Адаптивная графовая система знаний.",
cn: "自适应知识图系统。"
},

2: {
title: "Teleportation Model",
en: "State transfer preserving identity.",
ru: "Перенос состояния с сохранением идентичности.",
cn: "保持身份的状态转移。"
},

3: {
title: "Coherence Field",
en: "System stability model.",
ru: "Модель устойчивости системы.",
cn: "系统稳定性模型。"
},

4: {
title: "Emergence Theory",
en: "Structures formed from simple rules.",
ru: "Структуры формируются из простых правил.",
cn: "结构由简单规则形成。"
},

5: {
title: "System Synthesis",
en: "Unified ASIL system.",
ru: "Единая система ASIL.",
cn: "统一的ASIL系统。"
}

};

/* LANGUAGE SWITCH */
function setLang(l){
lang = l;
updateLangUI();
render();
}

function updateLangUI(){
document.querySelectorAll(".lang div").forEach(el => el.classList.remove("active"));
document.getElementById(lang).classList.add("active");
}

/* RENDER */
function render(){

if(currentView.type === "home") home();
if(currentView.type === "contact") contact();
if(currentView.type === "publications") showPapers();
if(currentView.type === "paper") showPaper(currentView.id);

}

/* VIEWS */

function home(){
currentView = { type: "home" };

document.getElementById("main").innerHTML =
(lang === "ru") ? "<h1>ASIL Институт</h1>" :
(lang === "cn") ? "<h1>ASIL 研究所</h1>" :
"<h1>ASIL Systems Institute</h1>";
}

function contact(){
currentView = { type: "contact" };

document.getElementById("main").innerHTML =
(lang === "ru") ? "<h1>Контакты</h1><p>research@asil.systems</p>" :
(lang === "cn") ? "<h1>联系</h1><p>research@asil.systems</p>" :
"<h1>Contact</h1><p>research@asil.systems</p>";
}

function showPapers(){
currentView = { type: "publications" };

document.getElementById("main").innerHTML =
(lang === "ru") ? "<h1>Публикации</h1>" :
(lang === "cn") ? "<h1>出版物</h1>" :
"<h1>Publications</h1>";
}

function showPaper(id){
currentView = { type: "paper", id: id };

let p = papers[id];

document.getElementById("main").innerHTML = `
<div class="paper">
<h1>${p.title}</h1>
<p>${p[lang]}</p>
</div>
`;
}

/* INIT */
updateLangUI();
home();

</script>

</body>
</html>
