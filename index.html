<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>ASIL System v20</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #05070c;
    color: #d7e6f2;
    overflow: hidden;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* HEADER */
.header {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 10px;
    background: rgba(10,14,20,0.7);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 12px;
    color: #58a6ff;
}

/* INFO PANEL */
.panel {
    position: absolute;
    right: 10px;
    top: 10px;
    width: 320px;
    padding: 12px;
    background: rgba(10,14,20,0.8);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
}

.title {
    color: #58a6ff;
    font-size: 13px;
    margin-bottom: 8px;
}

.item {
    font-size: 11px;
    margin-bottom: 6px;
    padding-left: 10px;
    border-left: 2px solid rgba(88,166,255,0.4);
}

/* NODES */
.node {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #58a6ff;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(88,166,255,0.5);
}

.node:hover {
    background: white;
}

</style>

</head>

<body>

<canvas id="c"></canvas>

<div class="header">
ASIL SYSTEM v20 — stable knowledge graph
</div>

<div class="panel" id="panel">
<div class="title">CHAIN VIEW</div>
<div class="item">Click node to view structure</div>
</div>

<!-- NODES -->
<div class="node" style="left:250px;top:200px;" onclick="openNode('teleport')"></div>
<div class="node" style="left:600px;top:180px;" onclick="openNode('coherence')"></div>
<div class="node" style="left:400px;top:420px;" onclick="openNode('asil')"></div>

<script>

/* CHAIN DATA (RESTORED CLEAN VERSION) */
const chains = {

teleport: [
"Project: Teleportation Model",
"Article I: State Transfer Theory",
"Article II: Distributed Systems Mapping",
"Result: Cross-system synchronization"
],

coherence: [
"Project: Coherence Field",
"Article I: Stability Principles",
"Article II: Network Synchronization",
"Result: System stability layer"
],

asil: [
"Project: ASIL Core System",
"Layer 1: Vision Abstraction",
"Layer 2: Intelligence Processing",
"Layer 3: Interaction Dynamics",
"Layer 4: Stability Control",
"Result: Unified knowledge architecture"
]

};

function openNode(id){

let chain = chains[id];

let html = `<div class="title">STRUCTURE EXPANSION</div>`;

chain.forEach((c,i)=>{
html += `<div class="item">${i+1}. ${c}</div>`;
});

document.getElementById("panel").innerHTML = html;

}

/* SIMPLE BACKGROUND GRAPH */
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

function draw(){

ctx.clearRect(0,0,innerWidth,innerHeight);

/* simple connections */
ctx.strokeStyle = "rgba(88,166,255,0.1)";

ctx.beginPath();
ctx.moveTo(250,200);
ctx.lineTo(600,180);
ctx.lineTo(400,420);
ctx.stroke();

}

function loop(){
draw();
requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
