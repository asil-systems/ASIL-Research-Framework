<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>ASIL Scientific Research System</title>

<style>

body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: radial-gradient(circle at top, #02040a, #010208);
    color: #d7e6f2;
}

/* CANVAS */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* HEADER */
.header {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 14px;
    width: 300px;
    background: rgba(10,14,20,0.75);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    backdrop-filter: blur(12px);
}

.title {
    font-size: 13px;
    color: #58a6ff;
    margin-bottom: 6px;
}

.sub {
    font-size: 11px;
    opacity: 0.6;
}

/* ISS CORE (CONTROL, NOT GAME OBJECT) */
.iss {
    position: absolute;
    width: 170px;
    height: 60px;
    border-radius: 30px;
    background: #ffffff;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(255,255,255,0.4);
    user-select: none;
}

/* INFO PANEL */
.info {
    position: absolute;
    right: 12px;
    top: 12px;
    width: 320px;
    padding: 14px;
    background: rgba(10,14,20,0.75);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
}

.node-title {
    color: #58a6ff;
    font-size: 13px;
    margin-bottom: 8px;
}

.text {
    font-size: 11px;
    opacity: 0.75;
    line-height: 1.5;
}

/* NODE LABELS */
.label {
    position: absolute;
    font-size: 11px;
    color: #bcd0e5;
    opacity: 0.8;
    pointer-events: none;
}

</style>

</head>

<body>

<canvas id="c"></canvas>

<div class="header">
<div class="title">ASIL RESEARCH INTERFACE</div>
<div class="sub">scientific model of distributed knowledge systems</div>
</div>

<div class="info" id="info">
<div class="node-title">SYSTEM READY</div>
<div class="text">
Select a research node to view structured explanation of the model.
</div>
</div>

<div class="iss" id="iss">SYSTEM CORE (ISS CONTROL)</div>

<script>

const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

window.onresize = () => {
c.width = innerWidth;
c.height = innerHeight;
};

/* ISS POSITION */
let issX = innerWidth/2;
let issY = innerHeight/2;

/* NODES = SCIENTIFIC MODULES */
const nodes = [
{
x: 300, y: 200,
name: "Teleportation Model",
desc: "Mathematical abstraction of state transfer between distributed systems."
},
{
x: 700, y: 150,
name: "System Coherence",
desc: "Stability conditions for multi-agent synchronization."
},
{
x: 650, y: 450,
name: "Navigation Logic",
desc: "Graph traversal of knowledge states instead of linear UI flow."
},
{
x: 300, y: 500,
name: "Emergence Layer",
desc: "Formation of global patterns from local interactions."
}
];

/* DRAW */
function draw(){

ctx.clearRect(0,0,innerWidth,innerHeight);

/* LINKS */
for(let i=0;i<nodes.length;i++){
for(let j=i+1;j<nodes.length;j++){

ctx.strokeStyle = "rgba(88,166,255,0.15)";
ctx.beginPath();
ctx.moveTo(nodes[i].x,nodes[i].y);
ctx.lineTo(nodes[j].x,nodes[j].y);
ctx.stroke();

}
}

/* NODE LINKS TO CORE */
nodes.forEach(n=>{
ctx.strokeStyle = "rgba(255,255,255,0.08)";
ctx.beginPath();
ctx.moveTo(n.x,n.y);
ctx.lineTo(issX,issY);
ctx.stroke();
});

/* NODES */
nodes.forEach(n=>{
ctx.beginPath();
ctx.fillStyle = "#58a6ff";
ctx.arc(n.x,n.y,5,0,Math.PI*2);
ctx.fill();
});

/* CORE */
ctx.beginPath();
ctx.fillStyle = "#ffffff";
ctx.arc(issX,issY,8,0,Math.PI*2);
ctx.fill();

}

/* UPDATE ISS (SMOOTH DRIFT ONLY) */
function update(){

let t = Date.now()*0.0003;

issX = innerWidth/2 + Math.cos(t)*180;
issY = innerHeight/2 + Math.sin(t*1.2)*120;

document.getElementById("iss").style.left = issX + "px";
document.getElementById("iss").style.top = issY + "px";

}

/* CLICK NODE = SHOW INFO */
function attachClicks(){

c.addEventListener("click",(e)=>{

let mx = e.clientX;
let my = e.clientY;

nodes.forEach(n=>{

let d = Math.hypot(mx-n.x,my-n.y);

if(d < 20){
document.getElementById("info").innerHTML = `
<div class="node-title">${n.name}</div>
<div class="text">${n.desc}</div>
`;
}

});

});

}

attachClicks();

/* LOOP */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
