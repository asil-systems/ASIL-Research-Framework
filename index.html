<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASIL Systems Institute</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #070b12;
    color: #d7e6f2;
}

/* TOP */
.topbar {
    height: 52px;
    background: rgba(10,14,20,0.95);
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.logo {
    color: #58a6ff;
    font-weight: bold;
    font-size: 13px;
}

.nav {
    margin-left: 30px;
    display: flex;
    gap: 20px;
}

.nav div {
    font-size: 12px;
    opacity: 0.7;
    cursor: pointer;
}

.nav div:hover {
    opacity: 1;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 52px);
}

.sidebar {
    width: 300px;
    background: rgba(10,14,20,0.6);
    border-right: 1px solid rgba(255,255,255,0.08);
    padding: 14px;
}

.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
    cursor: pointer;
}

.card:hover {
    background: rgba(88,166,255,0.08);
}

.card-title {
    color: #58a6ff;
    font-size: 12px;
}

.card-text {
    font-size: 11px;
    opacity: 0.7;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

h1 {
    color: #58a6ff;
    font-size: 20px;
}

.paper {
    margin-bottom: 25px;
    padding: 15px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
}

.section {
    margin-top: 10px;
    font-size: 12px;
}

.en {
    opacity: 0.85;
}

.ru {
    opacity: 0.85;
    color: #9ecbff;
}

/* CONTACT */
.contact {
    font-size: 12px;
    margin-top: 20px;
    opacity: 0.8;
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">ASIL SYSTEMS INSTITUTE</div>

<div class="nav">
<div onclick="home()">Home</div>
<div onclick="showPapers()">Publications</div>
<div onclick="contact()">Contact</div>
</div>
</div>

<div class="container">

<div class="sidebar">

<div class="card" onclick="showPaper(1)">
<div class="card-title">ASIL Core Architecture</div>
<div class="card-text">System foundation</div>
</div>

<div class="card" onclick="showPaper(2)">
<div class="card-title">Teleportation Model</div>
<div class="card-text">State transfer</div>
</div>

<div class="card" onclick="showPaper(3)">
<div class="card-title">Coherence Field</div>
<div class="card-text">Stability theory</div>
</div>

<div class="card" onclick="showPaper(4)">
<div class="card-title">Emergence</div>
<div class="card-text">Structure formation</div>
</div>

<div class="card" onclick="showPaper(5)">
<div class="card-title">System Synthesis</div>
<div class="card-text">Unified model</div>
</div>

</div>

<div class="main" id="main">
<h1>ASIL Research Platform</h1>
<p>Select a paper to read.</p>
</div>

</div>

<script>

function home(){
document.getElementById("main").innerHTML = `
<h1>ASIL Systems Institute</h1>
<p>Research platform for adaptive knowledge systems.</p>
`;
}

function contact(){
document.getElementById("main").innerHTML = `
<h1>Contact</h1>
<div class="contact">
Email: research@asil.systems<br>
Open for computational research collaboration
</div>
`;
}

function showPapers(){
document.getElementById("main").innerHTML = `
<h1>Publications</h1>
<p>Select a paper from the left panel.</p>
`;
}

function showPaper(id){

let content = "";

if(id === 1){
content = `
<div class="paper">
<h1>ASIL Core Architecture</h1>

<div class="section en">EN: Adaptive graph-based knowledge system.</div>
<div class="section ru">RU: Адаптивная графовая система знаний.</div>

<div class="section en">System layers: Vision, Intelligence, Interaction, Stability.</div>
<div class="section ru">Уровни: Зрение, Интеллект, Взаимодействие, Стабильность.</div>

<div class="section en">Result: self-evolving structure.</div>
<div class="section ru">Результат: саморазвивающаяся система.</div>
</div>`;
}

if(id === 2){
content = `
<div class="paper">
<h1>Teleportation Model</h1>

<div class="section en">EN: State transfer preserving identity.</div>
<div class="section ru">RU: Перенос состояния с сохранением идентичности.</div>

<div class="section en">State = structure + context + weight.</div>
<div class="section ru">Состояние = структура + контекст + вес.</div>

<div class="section en">Result: cross-system transfer.</div>
<div class="section ru">Результат: перенос между системами.</div>
</div>`;
}

if(id === 3){
content = `
<div class="paper">
<h1>Coherence Field</h1>

<div class="section en">EN: Stability of system connections.</div>
<div class="section ru">RU: Устойчивость связей системы.</div>

<div class="section en">High coherence → stability.</div>
<div class="section ru">Высокая согласованность → стабильность.</div>

</div>`;
}

if(id === 4){
content = `
<div class="paper">
<h1>Emergence</h1>

<div class="section en">EN: Complex structures from simple rules.</div>
<div class="section ru">RU: Сложные структуры из простых правил.</div>

<div class="section en">Result: knowledge clusters.</div>
<div class="section ru">Результат: кластеры знаний.</div>
</div>`;
}

if(id === 5){
content = `
<div class="paper">
<h1>System Synthesis</h1>

<div class="section en">EN: Unified ASIL system.</div>
<div class="section ru">RU: Единая система ASIL.</div>

<div class="section en">ASIL = Nodes + Relations + Dynamics + Stability</div>
<div class="section ru">ASIL = Узлы + Связи + Динамика + Стабильность</div>
</div>`;
}

document.getElementById("main").innerHTML = content;

}

</script>

</body>
</html>
