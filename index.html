<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>ASIL Chain View System</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #05070c;
    color: #d7e6f2;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* HEADER */
.header {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 10px;
    background: rgba(10,14,20,0.7);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    font-size: 12px;
    color: #58a6ff;
}

/* RIGHT PANEL */
.panel {
    position: absolute;
    right: 10px;
    top: 10px;
    width: 320px;
    padding: 12px;
    background: rgba(10,14,20,0.8);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
}

.title {
    color: #58a6ff;
    font-size: 13px;
    margin-bottom: 8px;
}

.item {
    font-size: 11px;
    opacity: 0.85;
    margin-bottom: 6px;
    padding-left: 10px;
    border-left: 2px solid rgba(88,166,255,0.4);
}

/* NODE */
.node {
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #58a6ff;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(88,166,255,0.5);
}

.node:hover {
    background: white;
}

</style>

</head>

<body>

<div class="header">
ASIL CHAIN SYSTEM — click node to expand knowledge graph
</div>

<div class="panel" id="panel">
<div class="title">CHAIN VIEW</div>
<div class="item">Click a node to see full project + article chain</div>
</div>

<canvas id="c"></canvas>

<!-- NODES -->
<div class="node" style="left:200px;top:200px;" onclick="openNode('teleport')"></div>
<div class="node" style="left:500px;top:180px;" onclick="openNode('coherence')"></div>
<div class="node" style="left:350px;top:420px;" onclick="openNode('asil')"></div>

<script>

/* KNOWLEDGE GRAPH (CHAIN STRUCTURE) */
const chains = {

teleport: [
"Project: ASIL Teleportation Engine",
"Article I: Quantum State Transfer Model",
"Article II: Distributed Synchronization Theory",
"Result: State mapping across systems"
],

coherence: [
"Project: Stability Research Layer",
"Article I: System Coherence Principles",
"Article II: Multi-agent Synchronization",
"Result: Stability in dynamic networks"
],

asil: [
"Root Project: ASIL Framework",
"Layer 1: Vision Abstraction System",
"Layer 2: Intelligence Computation Layer",
"Layer 3: Interaction Dynamics",
"Layer 4: Stability Control System",
"Result: Full adaptive knowledge system"
]

};

function openNode(id){

let chain = chains[id];

let html = `<div class="title">CHAIN EXPANSION</div>`;

chain.forEach((c,i)=>{
html += `<div class="item">${i+1}. ${c}</div>`;
});

document.getElementById("panel").innerHTML = html;

}

/* OPTIONAL VISUAL BACKGROUND LINES */
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

function draw(){

ctx.clearRect(0,0,innerWidth,innerHeight);

ctx.strokeStyle = "rgba(88,166,255,0.1)";

ctx.beginPath();
ctx.moveTo(200,200);
ctx.lineTo(500,180);
ctx.lineTo(350,420);
ctx.stroke();

}

function loop(){
draw();
requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
