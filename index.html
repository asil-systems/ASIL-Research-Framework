<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>ASIL Evolution System</title>

<style>

body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at top, #03060a, #010208);
    font-family: Arial;
}

/* CANVAS */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* PANEL */
.panel {
    position: absolute;
    top: 16px;
    left: 16px;
    width: 260px;
    padding: 14px;
    background: rgba(10,14,20,0.65);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    backdrop-filter: blur(12px);
}

.title {
    font-size: 13px;
    color: #58a6ff;
    margin-bottom: 10px;
}

.small {
    font-size: 11px;
    opacity: 0.6;
}

</style>

</head>

<body>

<canvas id="c"></canvas>

<div class="panel">
<div class="title">ASIL EVOLUTION SYSTEM</div>
<div class="small">adaptive graph / self-organizing structure</div>
</div>

<script>

const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

window.onresize = () => {
c.width = innerWidth;
c.height = innerHeight;
};

let mouse = {x: innerWidth/2, y: innerHeight/2};

window.addEventListener("mousemove", e=>{
mouse.x = e.clientX;
mouse.y = e.clientY;
});

/* NODES */
const nodes = [];

for(let i=0;i<12;i++){
nodes.push({
x: Math.random()*innerWidth,
y: Math.random()*innerHeight,
vx: (Math.random()-0.5)*1.2,
vy: (Math.random()-0.5)*1.2,
mass: Math.random()*2+1
});
}

/* EVOLUTION RULES */
function evolve(){

nodes.forEach(n=>{

// base movement
n.x += n.vx;
n.y += n.vy;

// mouse influence
let dx = mouse.x - n.x;
let dy = mouse.y - n.y;

n.x += dx * 0.0006;
n.y += dy * 0.0006;

// slight self-growth drift (evolution effect)
n.vx += (Math.random()-0.5)*0.02;
n.vy += (Math.random()-0.5)*0.02;

// bounds
if(n.x < 0 || n.x > innerWidth) n.vx *= -1;
if(n.y < 0 || n.y > innerHeight) n.vy *= -1;

});

}

/* DRAW SYSTEM */
function draw(){

ctx.clearRect(0,0,innerWidth,innerHeight);

/* LINKS (dynamic strength) */
for(let i=0;i<nodes.length;i++){
for(let j=i+1;j<nodes.length;j++){

let a = nodes[i];
let b = nodes[j];

let dist = Math.hypot(a.x-b.x, a.y-b.y);

if(dist < 200){

ctx.strokeStyle = `rgba(88,166,255,${1 - dist/200})`;

ctx.beginPath();
ctx.moveTo(a.x,a.y);
ctx.lineTo(b.x,b.y);
ctx.stroke();

}

}
}

/* NODES */
nodes.forEach(n=>{

ctx.beginPath();
ctx.fillStyle = "#58a6ff";
ctx.arc(n.x,n.y,4 + n.mass,0,Math.PI*2);
ctx.fill();

});

}

/* LOOP */
function loop(){
evolve();
draw();
requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
