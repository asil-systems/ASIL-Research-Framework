<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>ASIL Space Station Core System</title>

<style>

body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: radial-gradient(circle at top, #02040a, #010208);
    color: #d7e6f2;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* HEADER */
.header {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 14px;
    width: 320px;
    background: rgba(10,14,20,0.75);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
}

.title {
    font-size: 13px;
    color: #58a6ff;
}

.sub {
    font-size: 11px;
    opacity: 0.6;
}

/* INFO */
.info {
    position: absolute;
    right: 12px;
    top: 12px;
    width: 320px;
    padding: 14px;
    background: rgba(10,14,20,0.75);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
}

.node-title {
    color: #58a6ff;
    font-size: 13px;
    margin-bottom: 8px;
}

.text {
    font-size: 11px;
    opacity: 0.8;
    line-height: 1.5;
}

/* SPACE STATION CORE */
.station {
    position: absolute;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ffffff, #8aa0ff 40%, #2a3b7a 80%);
    box-shadow:
        0 0 40px rgba(120,150,255,0.6),
        0 0 100px rgba(80,120,255,0.3);

    cursor: pointer;
    z-index: 10;
}

/* ring */
.station::after {
    content: "";
    position: absolute;
    width: 160px;
    height: 160px;
    top: -25px;
    left: -25px;
    border-radius: 50%;
    border: 1px solid rgba(120,150,255,0.25);
    animation: rotate 6s linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

</style>

</head>

<body>

<canvas id="c"></canvas>

<div class="header">
<div class="title">ASIL SPACE RESEARCH GRAPH</div>
<div class="sub">orbital knowledge system with central station core</div>
</div>

<div class="info" id="info">
<div class="node-title">SYSTEM READY</div>
<div class="text">Hover nodes or click space station to explore system state.</div>
</div>

<!-- SPACE STATION CORE -->
<div class="station" id="station"></div>

<script>

const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

window.onresize = () => {
c.width = innerWidth;
c.height = innerHeight;
};

/* MOUSE */
let mouse = {x:0,y:0};

window.addEventListener("mousemove",(e)=>{
mouse.x = e.clientX;
mouse.y = e.clientY;
});

/* SPACE STATION */
const station = document.getElementById("station");

let t = 0;
let sx = innerWidth/2;
let sy = innerHeight/2;

/* NODES */
const nodes = [
{x:250,y:200,vx:0.1,vy:0.08,name:"Teleportation Model",desc:"State transfer abstraction between systems."},
{x:700,y:180,vx:-0.1,vy:0.07,name:"Coherence Field",desc:"Synchronization stability model."},
{x:650,y:450,vx:0.08,vy:-0.09,name:"Navigation Logic",desc:"Graph traversal structure."},
{x:300,y:520,vx:-0.07,vy:-0.08,name:"Emergence Layer",desc:"Pattern formation from interaction."}
];

let hoverNode = null;

/* MOVE STATION (ORBIT) */
function moveStation(){

t += 0.005;

sx = innerWidth/2 + Math.cos(t)*200;
sy = innerHeight/2 + Math.sin(t*1.3)*140;

station.style.left = (sx - 55) + "px";
station.style.top = (sy - 55) + "px";

}

/* UPDATE */
function update(){

nodes.forEach(n=>{

n.x += n.vx;
n.y += n.vy;

/* slow stable motion */
n.vx *= 0.995;
n.vy *= 0.995;

/* bounds */
if(n.x<50||n.x>innerWidth-50) n.vx*=-1;
if(n.y<50||n.y>innerHeight-50) n.vy*=-1;

/* station gravity */
let dx = sx - n.x;
let dy = sy - n.y;

n.x += dx*0.0007;
n.y += dy*0.0007;

});

/* hover */
hoverNode = null;

nodes.forEach(n=>{
let d = Math.hypot(mouse.x-n.x,mouse.y-n.y);
if(d<25) hoverNode = n;
});

}

/* DRAW */
function draw(){

ctx.clearRect(0,0,innerWidth,innerHeight);

/* links */
for(let i=0;i<nodes.length;i++){
for(let j=i+1;j<nodes.length;j++){

ctx.strokeStyle = "rgba(88,166,255,0.15)";
ctx.beginPath();
ctx.moveTo(nodes[i].x,nodes[i].y);
ctx.lineTo(nodes[j].x,nodes[j].y);
ctx.stroke();

}
}

/* station links */
nodes.forEach(n=>{
ctx.strokeStyle = "rgba(255,255,255,0.08)";
ctx.beginPath();
ctx.moveTo(n.x,n.y);
ctx.lineTo(sx,sy);
ctx.stroke();
});

/* nodes */
nodes.forEach(n=>{

ctx.beginPath();
ctx.fillStyle = (hoverNode===n) ? "#ffffff" : "#58a6ff";
ctx.arc(n.x,n.y, hoverNode===n ? 7 : 5,0,Math.PI*2);
ctx.fill();

/* label */
ctx.fillStyle = "rgba(220,235,255,0.9)";
ctx.font = "11px Arial";
ctx.fillText(n.name,n.x+10,n.y-10);

});

}

/* LOOP */
function loop(){
update();
draw();
moveStation();
requestAnimationFrame(loop);
}

loop();

/* CLICK STATION */
station.onclick = ()=>{

document.getElementById("info").innerHTML = `
<div class="node-title">SPACE STATION CORE ACTIVE</div>
<div class="text">
Central orbital structure stabilizing knowledge graph interactions.<br><br>
System state: ACTIVE COHERENCE MODE
</div>
`;

};

</script>

</body>
</html>
