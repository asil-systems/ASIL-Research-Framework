<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>ASIL Graph System</title>

<style>

body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at top, #05070c, #02040a);
    font-family: Arial, sans-serif;
    color: #d6e6f5;
}

/* CANVAS BACKGROUND */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* UI PANEL */
.panel {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 260px;
    background: rgba(10,14,20,0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px;
}

.title {
    font-size: 14px;
    margin-bottom: 10px;
    color: #58a6ff;
}

.node {
    padding: 8px;
    margin: 6px 0;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    transition: 0.2s;
}

.node:hover {
    background: rgba(88,166,255,0.2);
}

.small {
    font-size: 11px;
    opacity: 0.6;
}

</style>

</head>

<body>

<canvas id="c"></canvas>

<div class="panel">
<div class="title">ASIL Knowledge Graph</div>

<div class="node" onclick="focusNode(0)">Teleport Theory</div>
<div class="node" onclick="focusNode(1)">System Effects</div>
<div class="node" onclick="focusNode(2)">Navigation Model</div>
<div class="node" onclick="focusNode(3)">Research Materials</div>

<div class="small" style="margin-top:10px;">
LIVE GRAPH MODE • nodes connected dynamically
</div>
</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.onresize = () => {
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
};

const nodes = [
{ x: 200, y: 200, name: "Teleport Theory" },
{ x: 600, y: 150, name: "System Effects" },
{ x: 500, y: 450, name: "Navigation Model" },
{ x: 250, y: 500, name: "Research Materials" }
];

let focus = null;

/* DRAW LINKS */
function drawLines(){

ctx.strokeStyle = "rgba(88,166,255,0.25)";
ctx.lineWidth = 1;

for(let i=0;i<nodes.length;i++){
for(let j=i+1;j<nodes.length;j++){

ctx.beginPath();
ctx.moveTo(nodes[i].x, nodes[i].y);
ctx.lineTo(nodes[j].x, nodes[j].y);
ctx.stroke();

}
}
}

/* DRAW NODES */
function drawNodes(){

nodes.forEach((n,i)=>{

ctx.beginPath();
ctx.fillStyle = (focus === i) ? "#7c4dff" : "#58a6ff";
ctx.arc(n.x, n.y, (focus === i) ? 10 : 7, 0, Math.PI*2);
ctx.fill();

/* label */
ctx.fillStyle = "rgba(255,255,255,0.8)";
ctx.font = "12px Arial";
ctx.fillText(n.name, n.x + 10, n.y - 10);

});
}

/* ANIMATE */
function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawLines();
drawNodes();

requestAnimationFrame(loop);
}

loop();

/* FOCUS NODE */
function focusNode(i){
focus = i;

/* simple attraction effect */
nodes.forEach((n,idx)=>{
if(idx === i){
n.x += (Math.random()-0.5)*10;
n.y += (Math.random()-0.5)*10;
}
});
}

</script>

</body>
</html>
