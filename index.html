<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>ASIL Research Platform</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #0a0f18;
    color: #d7e6f2;
}

/* TOP BAR */
.topbar {
    height: 50px;
    background: rgba(10,14,20,0.95);
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.logo {
    color: #58a6ff;
    font-weight: bold;
    font-size: 13px;
}

.container {
    display: flex;
    height: calc(100vh - 50px);
}

/* LEFT MENU */
.left {
    width: 300px;
    background: rgba(10,14,20,0.7);
    border-right: 1px solid rgba(255,255,255,0.08);
    padding: 12px;
}

.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    cursor: pointer;
}

.card:hover {
    background: rgba(88,166,255,0.08);
}

.title {
    font-size: 12px;
    color: #58a6ff;
}

.text {
    font-size: 11px;
    opacity: 0.7;
}

/* CENTER */
.center {
    flex: 1;
    padding: 20px;
}

h2 {
    color: #58a6ff;
}

/* RIGHT PANEL */
.panel {
    position: absolute;
    right: 10px;
    top: 60px;
    width: 320px;
    padding: 12px;
    background: rgba(10,14,20,0.85);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
}

.item {
    font-size: 11px;
    margin-bottom: 6px;
    padding-left: 10px;
    border-left: 2px solid rgba(88,166,255,0.4);
}

</style>

</head>

<body>

<div class="topbar">
<div class="logo">ASIL RESEARCH INSTITUTE</div>
</div>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="card" onclick="openProject('teleport')">
<div class="title">Teleportation Engine</div>
<div class="text">State transfer model</div>
</div>

<div class="card" onclick="openProject('coherence')">
<div class="title">Coherence Field</div>
<div class="text">System stability research</div>
</div>

<div class="card" onclick="openProject('asil')">
<div class="title">ASIL Core Framework</div>
<div class="text">Unified architecture system</div>
</div>

</div>

<!-- CENTER -->
<div class="center" id="center">
<h2>ASIL Research Platform</h2>
<p>Select a project to view publications.</p>
</div>

</div>

<!-- RIGHT PANEL -->
<div class="panel" id="panel">
<div class="item">Publications will appear here</div>
</div>

<script>

/* FULL RESEARCH STRUCTURE */
const data = {

teleport: [
"Project: Teleportation Engine",
"Paper I: State Transfer Theory",
"Paper II: Distributed Mapping Systems",
"Paper III: Synchronization Across Nodes",
"Result: Cross-system coherence model"
],

coherence: [
"Project: Coherence Field Research",
"Paper I: Stability Fundamentals",
"Paper II: Multi-agent Synchronization",
"Paper III: Dynamic Balance Systems",
"Result: Stable network architecture"
],

asil: [
"Project: ASIL Core System",
"Paper I: Vision Abstraction Layer",
"Paper II: Intelligence Computation Layer",
"Paper III: Interaction Dynamics Layer",
"Paper IV: Stability Control Layer",
"Result: Unified adaptive knowledge system"
]

};

function openProject(id){

/* CENTER VIEW */
document.getElementById("center").innerHTML =
`<h2>${id.toUpperCase()}</h2>
<p>Research papers and system structure loaded.</p>`;

/* RIGHT PANEL */
let html = "";

data[id].forEach((p,i)=>{
html += `<div class="item">${i+1}. ${p}</div>`;
});

document.getElementById("panel").innerHTML = html;

}

</script>

</body>
</html>
