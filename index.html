<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>ASIL Space Graph</title>

<style>

body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: black;
    color: #d7e6f2;
}

/* CANVAS */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* INFO */
.info {
    position: absolute;
    top: 10px;
    left: 10px;
    width: 320px;
    padding: 12px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    backdrop-filter: blur(10px);
}

.title {
    color: #58a6ff;
    font-size: 13px;
}

.text {
    font-size: 11px;
    opacity: 0.8;
    margin-top: 6px;
}

</style>

</head>

<body>

<canvas id="c"></canvas>

<div class="info" id="info">
<div class="title">ASIL SPACE SYSTEM</div>
<div class="text">Click nodes. Center = black hole gravity field.</div>
</div>

<script>

const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

window.onresize = () => {
c.width = innerWidth;
c.height = innerHeight;
};

/* STARFIELD */
const stars = [];

for(let i=0;i<200;i++){
stars.push({
x: Math.random()*innerWidth,
y: Math.random()*innerHeight,
z: Math.random()*1
});
}

/* NODES */
const nodes = [
{x:300,y:200,vx:0.1,vy:0.05,name:"Teleportation"},
{x:700,y:180,vx:-0.08,vy:0.06,name:"Coherence"},
{x:600,y:450,vx:0.07,vy:-0.05,name:"ASIL Core"}
];

/* BLACK HOLE CENTER */
let cx = innerWidth/2;
let cy = innerHeight/2;

/* DRAW STARFIELD */
function drawStars(){

ctx.fillStyle = "white";

stars.forEach(s=>{

ctx.globalAlpha = 0.3 + s.z;
ctx.fillRect(s.x,s.y,1,1);

});

ctx.globalAlpha = 1;

}

/* DRAW BLACK HOLE */
function drawBlackHole(){

let grd = ctx.createRadialGradient(cx,cy,10,cx,cy,400);

grd.addColorStop(0,"rgba(0,0,0,1)");
grd.addColorStop(0.3,"rgba(10,20,40,0.8)");
grd.addColorStop(0.6,"rgba(0,0,0,0.4)");
grd.addColorStop(1,"rgba(0,0,0,0)");

ctx.fillStyle = grd;
ctx.beginPath();
ctx.arc(cx,cy,400,0,Math.PI*2);
ctx.fill();

}

/* UPDATE */
function update(){

nodes.forEach(n=>{

/* gravity toward black hole */
let dx = cx - n.x;
let dy = cy - n.y;

n.vx += dx*0.00002;
n.vy += dy*0.00002;

n.x += n.vx;
n.y += n.vy;

/* damping */
n.vx *= 0.995;
n.vy *= 0.995;

});

}

/* DRAW */
function draw(){

ctx.clearRect(0,0,innerWidth,innerHeight);

/* background stars */
drawStars();

/* black hole */
drawBlackHole();

/* connections */
for(let i=0;i<nodes.length;i++){
for(let j=i+1;j<nodes.length;j++){

ctx.strokeStyle = "rgba(88,166,255,0.15)";
ctx.beginPath();
ctx.moveTo(nodes[i].x,nodes[i].y);
ctx.lineTo(nodes[j].x,nodes[j].y);
ctx.stroke();

}
}

/* nodes */
nodes.forEach(n=>{

ctx.fillStyle = "#58a6ff";
ctx.beginPath();
ctx.arc(n.x,n.y,10,0,Math.PI*2);
ctx.fill();

/* glow */
ctx.fillStyle = "rgba(88,166,255,0.2)";
ctx.beginPath();
ctx.arc(n.x,n.y,18,0,Math.PI*2);
ctx.fill();

ctx.fillStyle = "white";
ctx.font = "11px Arial";
ctx.fillText(n.name,n.x+12,n.y-10);

});

}

/* LOOP */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
